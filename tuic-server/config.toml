log_level = "info"
server = "[::]:443"
udp_relay_ipv6 = true
zero_rtt_handshake = false
dual_stack = true
auth_timeout = "3s"
task_negotiation_timeout = "3s"
gc_interval = "10s"
gc_lifetime = "30s"
max_external_packet_size = 1500
stream_timeout = "60s"
tokio_runtime = "auto"

acl = '''
socks_proxy 0.0.0.0/0
socks_proxy ::/0

[users]
f0e12827-fe60-458c-8269-a05ccb0ff8d1 = ""

[tls]
self_sign = false
certificate = "/root/ssl/server.cer"
private_key = "/root/ssl/server.key"
alpn = ["h3"]

[outbound]

[outbound.default]
type = "direct"
ip_mode = "v4first"

[outbound.socks_proxy]
type = "socks5"
addr = "127.0.0.1:1080"
allow_udp = true
